# Nginx Configuration for KidChatbox
# Copy this file to: /etc/nginx/sites-available/kidchatbox
# Then enable it: sudo ln -s /etc/nginx/sites-available/kidchatbox /etc/nginx/sites-enabled/

# HTTP Server (Port 80)
server {
    listen 80;
    server_name guru-ai.cloud www.guru-ai.cloud;

    # Study library / quiz uploads (multer allows up to 50MB)
    client_max_body_size 50m;
    
    # Domain: guru-ai.cloud
    # Port: 3001 (KidChatbox default port)
    # IMPORTANT: If you change PORT in .env, update proxy_pass below

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # Shared proxy headers (used by both location blocks below)
    # Study Mode + quiz AI can run 2–10 min on CPU; default nginx 60s causes 504 Gateway Timeout.

    # Long-running API (Ollama /api/ai/chat, quiz jobs, uploads)
    location /api/ {
        proxy_pass http://localhost:3001;  # ← Change 3001 to match your PORT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # SPA + static assets (shorter timeout is fine)
    location / {
        proxy_pass http://localhost:3001;  # ← Change 3001 to match your PORT
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check endpoint (optional)
    location /health {
        proxy_pass http://localhost:3001/health;
        proxy_set_header Host $host;
    }
}

# HTTPS Server (Port 443) - Auto-configured by Certbot after SSL setup
# After running: sudo certbot --nginx -d guru-ai.cloud -d www.guru-ai.cloud
# Certbot will automatically add HTTPS configuration here.
# IMPORTANT: If you already have HTTPS, copy the /api/ and / location blocks above
# into the ssl server { } block — Certbot does not update timeouts on renew.

